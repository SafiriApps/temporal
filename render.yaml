          name: temporal-db
          property: database
      - key: VISIBILITY_DBNAME
        fromDatabase:
          name: temporal-db
          property: database
      - key: DB_PORT
        fromDatabase:
          name: temporal-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: temporal-db
          property: user
      - key: POSTGRES_PWD
        fromDatabase:
          name: temporal-db
          property: password
      - key: POSTGRES_SEEDS
        fromDatabase:
          name: temporal-db
          property: host
      - key: VISIBILITY_DB_PORT
        fromDatabase:
          name: temporal-db
          property: port
      - key: VISIBILITY_POSTGRES_USER
