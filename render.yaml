databases:
  - name: temporal-db
    databaseName: temporal
    user: temporal
    plan: pro-4gb
    diskSizeGB: 50
    storageAutoscalingEnabled: true
    region: frankfurt

envVarGroups:
  - name: temporal-shared
    envVars:
      - key: DYNAMIC_CONFIG_FILE_PATH
        value: /etc/temporal/dynamicconfig_es.yaml
      - key: ENABLE_ES
        value: true
      - key: ES_VERSION
        value: v7
      - key: ES_USER
        value: elastic
      - key: DB
        value: postgres12

services:
  - type: pserv
    name: temporal-elasticsearch
    autoDeploy: false
    plan: Standard
    region: frankfurt
    env: docker
    dockerfilePath: ./temporal-cluster/elasticsearch/Dockerfile
    disk:
      name: esdata
      mountPath: /usr/share/elasticsearch/data
      sizeGB: 20
    envVars:
      - key: PORT
        value: 9200
      - key: ES_JAVA_OPTS
        value: "-Xms1g -Xmx1g"
      - key: xpack.security.enabled
        value: true
      - key: ELASTIC_PASSWORD
        generateValue: true
      - key: cluster.routing.allocation.disk.threshold_enabled
        value: true
      - key: cluster.routing.allocation.disk.watermark.low
        value: 512mb
      - key: cluster.routing.allocation.disk.watermark.high
        value: 256mb
      - key: cluster.routing.allocation.disk.watermark.flood_stage
        value: 128mb
      - key: discovery.type
        value: single-node

  - type: pserv
    name: temporal-frontend
    autoDeploy: false
    plan: Standard
    region: frankfurt
    env: docker
    dockerfilePath: ./temporal-cluster/server/auto-setup/Dockerfile
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 80
      targetCPUPercent: 80
    envVars:
      - fromGroup: temporal-shared
      - key: SERVICES
        value: frontend
      - key: SKIP_DB_CREATE
        value: true
      - key: ES_SEEDS
        fromService:
          name: temporal-elasticsearch
          type: pserv
          property: host
      - key: ES_PWD
        fromService:
          name: temporal-elasticsearch
          type: pserv
          envVarKey: ELASTIC_PASSWORD
      - key: DBNAME
        fromDatabase:
          name: temporal-db
          property: database
      - key: VISIBILITY_DBNAME
        fromDatabase:
          name: temporal-db
          property: database
      - key: DB_PORT
        fromDatabase:
          name: temporal-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: temporal-db
          property: user
      - key: POSTGRES_PWD
        fromDatabase:
          name: temporal-db
          property: password
      - key: POSTGRES_SEEDS
        fromDatabase:
          name: temporal-db
          property: host
      - key: VISIBILITY_DB_PORT
        fromDatabase:
          name: temporal-db
          property: port
      - key: VISIBILITY_POSTGRES_USER
        fromDatabase:
          name: temporal-db
          property: user
      - key: VISIBILITY_POSTGRES_PWD
        fromDatabase:
          name: temporal-db
          property: password
      - key: VISIBILITY_POSTGRES_SEEDS
        fromDatabase:
          name: temporal-db
          property: host

  - type: pserv
    name: temporal-history
    autoDeploy: false
    plan: Standard
    region: frankfurt
    env: docker
    dockerfilePath: ./temporal-cluster/server/Dockerfile
    scaling:
